<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Card Game{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }
    nav {
      background: #16213e;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border-bottom: 2px solid #0f3460;
    }
    nav h1 { font-size: 1.4rem; color: #e94560; }
    .btn {
      padding: .5rem 1.2rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: .95rem;
      font-weight: 600;
      transition: opacity .2s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: #e94560; color: #fff; }
    .btn-secondary { background: #0f3460; color: #eee; }
    .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }
    .card {
      background: #16213e;
      border-radius: 10px;
      padding: 1.5rem;
      border: 1px solid #0f3460;
    }
    input, select {
      background: #0f3460;
      color: #eee;
      border: 1px solid #e94560;
      border-radius: 6px;
      padding: .5rem .8rem;
      font-size: .95rem;
    }
    #flash {
      position: fixed;
      top: 1rem; right: 1rem;
      background: #e94560;
      color: #fff;
      padding: .7rem 1.2rem;
      border-radius: 8px;
      display: none;
      z-index: 999;
      font-weight: 600;
    }
  </style>
  <script>
    const APP_ROOT  = "{{ request.script_root }}";
    const STATIC_URL = "{{ url_for('static', filename='') }}";
    const url = path => APP_ROOT + path;
  </script>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <h1>🃏 Card Game</h1>
    {% block nav %}{% endblock %}
  </nav>

  <div id="flash"></div>

  <div class="container">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
  <script>
    function flash(msg, color='#e94560') {
      const el = document.getElementById('flash');
      el.textContent = msg;
      el.style.background = color;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 3000);
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
